version: 2.1

orbs:
  vrsn: tx3stn/vrsn@volatile

anchors:
  dependabot-branch-regex: &dependabot-branch-regex /^dependabot\/.*/

workflows:
  pr:
    jobs:
      - vrsn/bump-version:
          bump-type: patch
          ssh-key-fingerprint: SHA256:9Er98zwAAkt9hFqxdXsRNHT1tTGUg0a+uURv2PGPXIM
          filters:
            branches:
              only:
                - *dependabot-branch-regex
      - vrsn/check-version:
          filters:
            branches:
              ignore:
                - *dependabot-branch-regex
                - main
